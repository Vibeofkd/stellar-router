services:
  api-server:
    build:
      context: .
      target: api-server
    ports:
      - "8080:8080"
    environment:
      - STELLAR_NETWORK=testnet
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  metrics:
    build:
      context: .
      target: metrics
    ports:
      - "9090:9090"
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
