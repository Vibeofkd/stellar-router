# Prometheus configuration for stellar-router metrics exporter
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'stellar-router'
    environment: 'testnet'

scrape_configs:
  - job_name: 'stellar-router'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['router-metrics-exporter:9090']
        labels:
          service: 'stellar-router'
          component: 'metrics-exporter'

  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
